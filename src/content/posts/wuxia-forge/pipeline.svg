  <g transform="translate(520,250)">
    <rect width="370" height="180" rx="12" fill="#1a1424" stroke="#8a7cf0" stroke-width="2.5"/>
    <text x="185" y="40" text-anchor="middle" fill="#c9befc" font-size="18" font-weight="700">Claude가 담당 (창의성)</text>
