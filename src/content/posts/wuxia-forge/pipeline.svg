<svg viewBox="0 0 1000 480" xmlns="http://www.w3.org/2000/svg" font-family="Apple SD Gothic Neo, Pretendard, sans-serif">
  <rect width="1000" height="480" rx="16" fill="#171009"/>
  <text x="500" y="52" text-anchor="middle" fill="#f5ecd9" font-size="24" font-weight="700">forge.py 파이프라인 — 코드와 Claude의 역할 분담</text>

  <!-- steps -->
  <g>
    <g transform="translate(60,100)">
      <rect width="160" height="86" rx="12" fill="#241a0e" stroke="#d9a441" stroke-width="2"/>
