      <text x="80" y="64" text-anchor="middle" fill="#a08c66" font-size="13">dak.gg 전적</text>
    </g>
    <g transform="translate(250,100)">
      <rect width="160" height="86" rx="12" fill="#241a0e" stroke="#d9a441" stroke-width="2"/>
      <text x="80" y="36" text-anchor="middle" fill="#f0c66a" font-size="16" font-weight="700">② 카탈로그</text>
      <text x="80" y="64" text-anchor="middle" fill="#a08c66" font-size="13">88캐릭터 → 13문파</text>
    </g>
    <g transform="translate(440,100)">
      <rect width="160" height="86" rx="12" fill="#1a1424" stroke="#8a7cf0" stroke-width="2.5"/>
