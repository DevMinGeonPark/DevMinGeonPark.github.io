      <text x="80" y="64" text-anchor="middle" fill="#9d90c9" font-size="13">문파 선택 + 작문</text>
    </g>
    <g transform="translate(630,100)">
      <rect width="160" height="86" rx="12" fill="#241a0e" stroke="#d9a441" stroke-width="2"/>
      <text x="80" y="36" text-anchor="middle" fill="#f0c66a" font-size="16" font-weight="700">④ 렌더</text>
      <text x="80" y="64" text-anchor="middle" fill="#a08c66" font-size="13">단일 HTML</text>
    </g>
    <g transform="translate(820,100)">
      <rect width="120" height="86" rx="12" fill="#241a0e" stroke="#d9a441" stroke-width="2"/>
      <text x="60" y="36" text-anchor="middle" fill="#f0c66a" font-size="16" font-weight="700">⑤ 배포</text>
      <text x="60" y="64" text-anchor="middle" fill="#a08c66" font-size="13">pm2 + CF 터널</text>
    </g>
  </g>
  <g stroke="#8a7452" stroke-width="2.5" fill="none">
    <path d="M225 143 H 242"/><path d="M415 143 H 432"/><path d="M605 143 H 622"/><path d="M795 143 H 812"/>
  </g>
  <g fill="#8a7452">
    <path d="M246 143 l -12 -6 v 12 z"/><path d="M436 143 l -12 -6 v 12 z"/><path d="M626 143 l -12 -6 v 12 z"/><path d="M816 143 l -12 -6 v 12 z"/>
  </g>

  <!-- role split -->
  <g transform="translate(110,250)">
    <rect width="370" height="180" rx="12" fill="#241a0e" stroke="#d9a441" stroke-width="2"/>
    <text x="185" y="40" text-anchor="middle" fill="#f0c66a" font-size="18" font-weight="700">코드가 통제 (일관성)</text>
    <g font-size="15" fill="#cbb896">
