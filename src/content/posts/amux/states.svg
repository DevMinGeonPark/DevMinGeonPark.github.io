  <line x1="70" y1="342" x2="930" y2="342" stroke="#dddddd" stroke-width="1.5"/>
  <text x="500" y="386" text-anchor="middle" fill="#555555" font-size="15">tmux 라이브 화면 캡처 → 선택 박스 · 스피너 · 프롬프트 신호를 우선순위대로 판정</text>
