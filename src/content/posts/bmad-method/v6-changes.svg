<svg viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" font-family="Apple SD Gothic Neo, Pretendard, sans-serif">
  <rect width="1000" height="420" rx="12" fill="#ffffff" stroke="#111111" stroke-width="2"/>
