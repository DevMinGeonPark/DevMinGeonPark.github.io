  <g transform="translate(60,90)">
    <rect width="380" height="290" rx="10" fill="#ffffff" stroke="#999999" stroke-width="2" stroke-dasharray="7 6"/>
    <text x="28" y="44" fill="#999999" font-size="18" font-weight="700">내 메모 (v4/v5 기준)</text>
    <g font-size="15" fill="#999999">
      <text x="28" y="92">· 고정 애자일 페르소나 프레임워크</text>
