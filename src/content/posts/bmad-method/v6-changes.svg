    <line x1="28" y1="236" x2="352" y2="236" stroke="#dddddd" stroke-width="1.5"/>
    <text x="28" y="266" fill="#999999" font-size="13.5">몇 달 전 조사에서 그대로 굳음</text>
  </g>

  <g transform="translate(560,90)">
